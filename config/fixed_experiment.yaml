simulation:
  seed: 42                        # fixed seed for deterministic runs
  num_robots: 1
  robot_start_mode: fixed
  robot_start_positions: [[0.0, 0.0]]
  sheep_start_mode: fixed
  sheep_start_positions:
    - [1.0, 1.0]
    - [2.0, 1.0]
    - [3.0, 1.0]
    - [4.0, 1.0]
    - [5.0, 1.0]
    - [1.0, 2.0]
    - [2.0, 2.0]
    - [3.0, 2.0]
    - [4.0, 2.0]
    - [5.0, 2.0]
    - [1.0, 3.0]
    - [2.0, 3.0]
    - [3.0, 3.0]
    - [4.0, 3.0]
    - [5.0, 3.0]
  sheep_spawn_bounds: [0.0, 0.0, 10.0, 10.0]
  num_sheep: 15
  steps: null
  bounds: [0, 0, 20, 20]
  goal_pos: [18.0, 18.0]
  goal_radius: 2.0
  fence: [[5.0, 5.0], [15.0, 5.0]]

planner:
  backend: pyperplan
  popf_command: popf
  timeout_s: null
  replan_interval: 300
  grid_size: 5

logging:
  planner_quiet: true
  iteration_log_interval: 100

metrics:
  enabled: true
  reactive_output_path: data/logs/run_metrics_fixed.json
  pddl_output_path: data/logs/run_pddl_metrics_fixed.json

pddl:
  domain_name: shepherding
  problem_name: shepherding-problem
  domain_path: pddl/shepherding_domain.pddl
  problem_path: pddl/problem.pddl

flocking:
  w_coh: 0.05
  w_sep: 0.4
  w_align: 0.05
  w_robot: 0.2
  w_fence: 1.5
  min_dist: 0.5
  max_speed: 0.15
  dt: 0.05
  neighbor_radius: 2.5
  noise_std: 0.01

robot:
  collect_threshold: 4.0
  collect_distance: 2.0
  drive_distance: 4.0
  robot_max_speed: 0.15
  robot_influence: 4.0
  robot_sheep_min_distance: 1.0
  robot_fence_clearance: 0.2
